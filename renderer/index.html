<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' file:; object-src 'self' data:; script-src 'self';" />
  <title>FileScope</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <button id="btn-open-folder" title="Open Folder">📂 Open Folder</button>
        <span id="current-folder-name"></span>
      </div>
      <div id="breadcrumbs"></div>
      <ul id="file-tree"></ul>
    </aside>

    <!-- Divider for resizing -->
    <div id="divider"></div>

    <!-- Viewer -->
    <main id="viewer">
      <div id="viewer-empty">
        <p>Select a file to preview</p>
      </div>
      <div id="viewer-content" class="hidden"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
